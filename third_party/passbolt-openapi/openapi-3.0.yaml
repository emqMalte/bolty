openapi: 3.0.3
info:
    contact:
        email: contact@passbolt.com
    description: >-
        This is a low-level overview of the API and its endpoints, if you need higher-level guides for interacting with the endpoints, use the Developer guide.
    license:
        name: AGPL-3.0
        url: https://www.gnu.org/licenses/agpl-3.0.html
    termsOfService: https://www.passbolt.com/terms
    title: Passbolt API
    version: 5.0.0
servers:
    - url: https://passbolt.local
      description: API Passbolt
paths:
    /auth/is-authenticated.json:
        get:
            summary: Check authentication status.
            description: Can be used as a session keep-alive.
            operationId: viewAuthIsAuthenticated
            security:
                - gpgCookieAuthentication: []
            x-codeSamples:
                - lang: cURL
                  source: |
                    curl --request GET \
                      --url {{API_BASE_URL}}/auth/is-authenticated.json \
                      --header 'Authorization: Bearer {{JWT_TOKEN}}'
                - lang: JavaScript
                  source: >
                    const url = '{{API_BASE_URL}}/auth/is-authenticated.json';

                    const options = {method: 'GET', headers: {Authorization: 'Bearer {{JWT_TOKEN}}'}};


                    try {

                      const response = await fetch(url, options);
                      const data = await response.json();
                      console.log(data);
                    } catch (error) {

                      console.error(error);
                    }

                - lang: PHP
                  source: |
                    <?php
                    $curl = curl_init();

                    curl_setopt_array($curl, [
                      CURLOPT_URL => "{{API_BASE_URL}}/auth/is-authenticated.json",
                      CURLOPT_RETURNTRANSFER => true,
                      CURLOPT_ENCODING => "",
                      CURLOPT_MAXREDIRS => 10,
                      CURLOPT_TIMEOUT => 30,
                      CURLOPT_HTTP_VERSION => CURL_HTTP_VERSION_1_1,
                      CURLOPT_CUSTOMREQUEST => "GET",
                      CURLOPT_HTTPHEADER => [
                        "Authorization: Bearer {{JWT_TOKEN}}"
                      ],
                    ]);

                    $response = curl_exec($curl);
                    $err = curl_error($curl);

                    curl_close($curl);

                    if ($err) {
                      echo "cURL Error #:" . $err;
                    } else {
                      echo $response;
                    }
            tags:
                - Authentication (GPGAuth)
            responses:
                "200":
                    $ref: "#/components/responses/nullBody"
                "401":
                    $ref: "#/components/responses/authenticationRequired"
