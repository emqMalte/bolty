tags:
    - name: Authentication (GPGAuth)
      description: >
        The legacy authentication method, using the GPGAuth protocol.


        Find more [here](https://www.passbolt.com/docs/development/authentication).

    - name: Authentication (JWT)
      description: >
        JWT-based authentication is the preferred way to interact with the Passbolt API. Find more [here](https://www.passbolt.com/docs/development)

    - name: Avatars
      description: Query avatar images.
    - name: Comments
      description: Manipulate comments for resources.
    - name: Directory Sync
      description: Run directory synchronization.
    - name: Favorites
      description: >
        The favorite endpoints are used to add or remove a `Resource` from your favorites.

    - name: Folders
      description: Organize your passwords and share them in bulk using folders.
    - name: GPG keys
      description: >
        In order to encrypt information, the server and the clients needs the user's public keys. These OpenPGP endpoints let you query the saved public key data.

    - name: Groups
      description: >
        Organize users in logical groups to make it easier to share resources with them.

    - name: Healthcheck
      description: Gather data about the passbolt instance's health.
    - name: Metadata keys
      description: Manipulate metadata keys.
    - name: Metadata private keys
      description: Manipulate private keys for metadata.
    - name: Metadata types settings
      description: >-
        Retrieve information about the resource types settings selected by the administrators
    - name: Metadata rotate key
      description: Gather information about metadata keys that needs to be rotated
    - name: Metadata session key
      description: Gather information on the saved encrypted session keys cache
    - name: Metadata upgrade
      description: Upgrading elements to the new v5 metadata format
    - name: Move
      description: Move a folder or a resource across folders.
    - name: Multi-Factor Authentication
      description: |
        Complete and validate authentication for users with MFA enabled.
    - name: Permissions
      description: Query permissions for resources.
    - name: Resources
      description: |
        A resource holds the metadata for its secrets.
    - name: Resource types
      description: >
        Resource-types are used for describing how and what data is stored for a resource and its associated secrets.

    - name: Roles
      description: Different categories of users.
    - name: Secrets
      description: Secrets associated to resources.
    - name: Settings
      description: Retrieve the server settings
    - name: Shares
      description: |
        Share resources and folders to users with an exhaustive permission system.
    - name: Tags
      description: Get tags and add tags to resources to categorize them.
    - name: Users
      description: |
        User are entities with the ability to interact with the application.
components:
    securitySchemes:
        bearerHttpAuthentication:
            description: Bearer token using a JWT
            type: http
            scheme: Bearer
            bearerFormat: JWT
        gpgCookieAuthentication:
            description: >-
                Session-based authentication. Note that a CSRF token needs to be provided through a header named `X-CSRF-Token`.
            type: apiKey
            in: cookie
            name: passbolt_session
    schemas:
        header:
            type: object
            required:
                - id
                - status
                - servertime
                - action
                - message
                - url
                - code
            properties:
                id:
                    type: string
                    format: uuid
                status:
                    type: string
                    enum:
                        - success
                        - error
                servertime:
                    type: integer
                    example: 1720702619
                action:
                    type: string
                    format: uuid
                message:
                    type: string
                    example: The operation was successful.
                url:
                    type: string
                    format: uri
                    example: /auth/verify.json
                code:
                    type: integer
                    example: 200
        jwk:
            type: object
            required:
                - kty
                - alg
                - use
                - e
                - "n"
            properties:
                kty:
                    type: string
                alg:
                    type: string
                use:
                    type: string
                e:
                    type: string
                "n":
                    type: string
        loginRequest:
            type: object
            required:
                - user_id
                - challenge
            properties:
                user_id:
                    type: string
                    format: uuid
                challenge:
                    type: string
                    description: "`gpg_encrypt(gpg_sign(challenge_message, user_key), server_key)`"
        loginResponse:
            type: object
            required:
                - challenge
            properties:
                challenge:
                    type: string
        logout:
            type: object
            properties:
                refresh_token:
                    type: string
                    format: uuid
        refreshRequest:
            type: object
            required:
                - refresh_token
                - user_id
            properties:
                refresh_token:
                    type: string
                    format: uuid
                user_id:
                    type: string
                    format: uuid
        refreshResponse:
            type: object
            required:
                - access_token
            properties:
                access_token:
                    type: string
        rsa:
            type: object
            required:
                - keydata
            properties:
                keydata:
                    type: string
        login:
            type: object
            required:
                - data
            properties:
                data:
                    type: object
                    required:
                        - gpg_auth
                    properties:
                        gpg_auth:
                            type: object
                            required:
                                - keyid
                            properties:
                                keyid:
                                    type: string
                                server_verify_token:
                                    type: string
                                    description: Used for server key verification.
                                user_token_result:
                                    type: string
                                    description: Used for client key verification.
        verify:
            type: object
            required:
                - fingerprint
                - keydata
            properties:
                fingerprint:
                    type: string
                keydata:
                    type: string
        commentUpdate:
            type: object
            required:
                - content
            properties:
                content:
                    type: string
        commentView:
            type: object
            required:
                - id
                - parent_id
                - foreign_key
                - foreign_model
                - content
                - created
                - modified
                - created_by
                - modified_by
                - user_id
            properties:
                id:
                    type: string
                    format: uuid
                parent_id:
                    type: string
                    format: uuid
                foreign_key:
                    type: string
                    format: uuid
                foreign_model:
                    type: string
                    enum:
                        - Resource
                content:
                    type: string
                created:
                    type: string
                    format: date-time
                modified:
                    type: string
                    format: date-time
                created_by:
                    type: string
                    format: uuid
                modified_by:
                    type: string
                    format: uuid
                user_id:
                    type: string
                    format: uuid
                children:
                    type: array
                    items:
                        $ref: "#/components/schemas/commentView"
                modifier:
                    $ref: "#/components/schemas/userIndexAndView"
                creator:
                    $ref: "#/components/schemas/userIndexAndView"
        userIndexAndView:
            type: object
            required:
                - id
                - role_id
                - username
                - active
                - deleted
                - created
                - modified
                - disabled
            properties:
                is_mfa_enabled:
                    type: boolean
                id:
                    type: string
                    format: uuid
                role_id:
                    type: string
                    format: uuid
                username:
                    type: string
                active:
                    type: boolean
                deleted:
                    type: boolean
                created:
                    type: string
                    format: date-time
                modified:
                    type: string
                    format: date-time
                disabled:
                    type: string
                    format: date-time
                    x-nullable: true
                profile:
                    type: object
                    required:
                        - id
                        - user_id
                        - first_name
                        - last_name
                        - created
                        - modified
                        - avatar
                    properties:
                        id:
                            type: string
                            format: uuid
                        user_id:
                            type: string
                            format: uuid
                        first_name:
                            type: string
                        last_name:
                            type: string
                        created:
                            type: string
                            format: date-time
                        modified:
                            type: string
                            format: date-time
                        avatar:
                            type: object
                            required:
                                - url
                            properties:
                                id:
                                    type: string
                                    format: uuid
                                profile_id:
                                    type: string
                                    format: uuid
                                created:
                                    type: string
                                    format: date-time
                                modified:
                                    type: string
                                    format: date-time
                                url:
                                    type: object
                                    required:
                                        - medium
                                        - small
                                    properties:
                                        medium:
                                            type: string
                                            format: url
                                        small:
                                            type: string
                                            format: url
                groups_users:
                    $ref: "#/components/schemas/groupsUsersIndexAndView"
                gpgkey:
                    $ref: "#/components/schemas/gpgkey"
                    x-nullable: true
                role:
                    $ref: "#/components/schemas/role"
                missing_metadata_key_ids:
                    type: array
                    items:
                        type: string
                        format: uuid
                last_logged_in:
                    type: string
                    format: date-time
                    x-nullable: true
        groupsUsersIndexAndView:
            type: object
            required:
                - id
                - group_id
                - user_id
                - is_admin
                - created
            properties:
                id:
                    type: string
                    format: uuid
                group_id:
                    type: string
                    format: uuid
                user_id:
                    type: string
                    format: uuid
                is_admin:
                    type: boolean
                created:
                    type: string
                    format: date-time
                user:
                    $ref: "#/components/schemas/userIndexAndView"
        gpgkey:
            type: object
            required:
                - id
                - user_id
                - armored_key
