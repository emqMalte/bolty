version: 2

project_name: bolty

before:
  hooks:
    - go mod download

builds:
  - id: bolty
    main: .
    binary: bolty
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/emqmalte/bolty/cmd.version={{ .Version }}
      - -X github.com/emqmalte/bolty/cmd.commit={{ .Commit }}
      - -X github.com/emqmalte/bolty/cmd.date={{ .Date }}

archives:
  - id: bolty
    ids:
      - bolty
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - LICENSE
      - NOTICE.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

sboms:
  - id: archive
    artifacts: archive
  - id: source
    artifacts: source

signs:
  - id: checksums
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
      - bolty
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

homebrew_casks:
  - name: bolty
    repository:
      owner: emqMalte
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    ids:
      - bolty
    binaries:
      - bolty
    generate_completions_from_executable:
      executable: "bin/bolty"
      args:
        - completion
      base_name: bolty
      shell_parameter_format: cobra
      shells:
        - bash
        - zsh
        - fish
    directory: Casks
    homepage: "https://github.com/emqmalte/bolty"
    description: "Inject Passbolt secrets into local configuration files"
    license: "AGPL-3.0-only"
    commit_author:
      name: "github-actions[bot]"
      email: "41898282+github-actions[bot]@users.noreply.github.com"

release:
  github:
    owner: emqmalte
    name: bolty
